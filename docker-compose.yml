services:
  postgres:
    image: postgres:16
    container_name: gluten_free_guide_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gluten_free_guide_dev
    ports:
      - "5432:5432"
    volumes:
      - gluten_free_guide_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gluten_free_guide_dev"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  gluten_free_guide_postgres_data:
